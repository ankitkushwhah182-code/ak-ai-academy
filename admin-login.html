<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TVK Foundation Admin Login</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
display:flex;justify-content:center;align-items:center;
height:100vh;background:#050505;
font-family:Arial,sans-serif;color:#fff}
.card{
width:360px;background:#111;border:2px solid #d4af37;
padding:30px;border-radius:18px;
box-shadow:0 0 20px rgba(212,175,55,.25)}
h1{text-align:center;color:#d4af37;margin-bottom:8px}
p{text-align:center;color:#bbb;margin-bottom:20px}
input{
width:100%;padding:14px;margin:10px 0;
background:#1a1a1a;color:#fff;
border:1px solid #444;border-radius:10px}
button{
width:100%;padding:14px;margin-top:10px;
background:#d4af37;color:#000;
border:none;border-radius:10px;
font-weight:bold;cursor:pointer}
button:hover{opacity:.9}
.msg{text-align:center;margin-top:15px;color:#ffcc66}
</style>
</head>
<body>
<div class="card">
<h1>TVK Foundation</h1>
<p>Admin Login</p>
<input id="email" type="email" placeholder="Admin Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<div class="msg" id="msg"></div>
</div>

<script>
function login(){
const email=document.getElementById('email').value.trim();
const pass=document.getElementById('password').value.trim();
if(email==="admin@tvkfoundation.com" && pass==="TVK@123"){
 document.getElementById('msg').innerHTML="Login Successful...";
 setTimeout(()=>location.href="admin.html",1000);
}else{
 document.getElementById('msg').innerHTML="Invalid Email or Password";
}
}
</script>
</body>
</html>
