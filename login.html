<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TVK Foundation Login</title>

<link rel="stylesheet" href="login.css">

</head>

<body>

<div class="login-container">

    <div class="login-box">

        <img src="TvkFounder.jpeg" class="logo">

        <h1>TVK Foundation</h1>

        <p>Admin Login Panel</p>

        <input
            type="email"
            id="email"
            placeholder="Enter Email">

        <input
            type="password"
            id="password"
            placeholder="Enter Password">

        <button id="loginBtn">

            LOGIN

        </button>

        <p id="msg"></p>

        <hr>

        <small>

            TVK Foundation © 2026

        </small>

    </div>

</div>

<script type="module" src="login.js"></script>

</body>

</html>
